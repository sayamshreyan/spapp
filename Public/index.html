<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aura - Premium Romantic Compliments</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#ee2b7c",
      },
      fontFamily: {
        display: ["Manrope", "sans-serif"],
        serif: ["Playfair Display", "serif"]
      }
    }
  }
}
</script>

<style>
body {
  min-height: 100vh;
}
</style>

</head>

<body class="font-display bg-gradient-to-br from-pink-50 via-rose-50 to-purple-100 min-h-screen flex items-center justify-center p-4">

<main class="relative w-full max-w-lg">

<div class="backdrop-blur-xl bg-white/50 border border-white/40 rounded-2xl shadow-[0_32px_64px_-16px_rgba(238,43,124,0.15)] overflow-hidden">

<div class="p-8 md:p-12">

<header class="text-center mb-10">
<h1 class="font-serif text-3xl md:text-4xl text-slate-900 font-bold mb-2">
Personalized Compliments
</h1>
<p class="text-slate-500 text-sm font-light">
Elegantly crafted words for the ones you adore.
</p>
</header>

<!-- Name Input -->
<div class="mb-6">
<input id="herName"
class="w-full bg-white/70 rounded-xl px-4 py-4 text-center text-lg focus:ring-2 focus:ring-primary/40 transition-all"
placeholder="Enter her name..."
type="text"/>
</div>

<!-- Mood Buttons -->
<div class="flex flex-wrap justify-center gap-3 mb-6">
<button onclick="selectMood('happy')" class="px-4 py-2 rounded-full bg-white/70 hover:bg-primary/10 transition">😊 Happy</button>
<button onclick="selectMood('sad')" class="px-4 py-2 rounded-full bg-white/70 hover:bg-primary/10 transition">😢 Sad</button>
<button onclick="selectMood('tired')" class="px-4 py-2 rounded-full bg-white/70 hover:bg-primary/10 transition">😴 Tired</button>
<button onclick="selectMood('angry')" class="px-4 py-2 rounded-full bg-white/70 hover:bg-primary/10 transition">😡 Angry</button>
</div>

<!-- Random Button -->
<button onclick="getRandomCompliment()"
class="w-full py-4 bg-primary text-white rounded-xl font-semibold shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 mb-10">
Spark Joy ✨
</button>

<!-- Image -->
<img id="complimentImage"
class="w-full h-48 mb-6 rounded-2xl object-cover hidden shadow-lg transition-all duration-500"/>

<!-- Compliment Text -->
<div id="compliment"
class="font-serif italic text-2xl text-center text-slate-800 min-h-[80px] transition-all duration-300">
<span class="text-slate-300">
Your heartfelt compliment will appear here...
</span>
</div>

</div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
